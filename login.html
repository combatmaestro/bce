<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Bristol Community Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">BCE</a>
    <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
        <li class="nav-item"><a href="events.html" class="nav-link">Events</a></li>
        <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
        <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
        <li class="nav-item"><a href="register.html" class="btn btn-warning rounded-pill px-4 ms-3">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero-small">
  <div class="container">
    <h1 class="fw-bold">Welcome Back</h1>
    <p class="lead mb-0">Log in to manage your bookings, tickets and event activity.</p>
  </div>
</section>

<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="contact-card">
        <h3 class="fw-bold mb-3">Login</h3>
        <form>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter password" />
          </div>
          <button class="btn btn-warning w-100">Login</button>
          <p class="text-center text-muted mt-3 mb-0">Don’t have an account? <a href="register.html">Register</a></p>
        </form>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="container text-center">
    <h5 class="fw-bold mb-2">Bristol Community Events</h5>
    <p class="mb-0">Stay connected to Bristol’s best experiences.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
