<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bristol Community Events | Discover, Book and Manage Events in Bristol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#ffb703; --primary-dark:#f59e0b; --dark:#0f172a; --muted:#64748b; --light:#f8fafc; --card:#ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins", sans-serif; }
        body { background:linear-gradient(135deg,#f8fafc 0%,#eef2ff 100%); color:var(--dark); }
        .navbar { background:rgba(15,23,42,.86); backdrop-filter:blur(10px); }
        .navbar-brand { color:white !important; font-weight:700; font-size:28px; }
        .navbar-nav .nav-link { color:white !important; margin-left:18px; transition:.3s; }
        .navbar-nav .nav-link:hover { color:var(--primary) !important; }
        .hero { background:linear-gradient(90deg,rgba(15,23,42,.85),rgba(15,23,42,.55)), url("https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1600&q=80"); background-size:cover; background-position:center; min-height:100vh; display:flex; align-items:center; color:white; padding-top:90px; }
        .hero h1 { font-size:clamp(2.3rem,5vw,4.2rem); font-weight:700; line-height:1.2; }
        .hero p { font-size:1.08rem; line-height:1.8; max-width:700px; margin:20px 0 28px; color:#e2e8f0; }
        .hero-btn { padding:13px 28px; border-radius:999px; margin-right:10px; margin-bottom:10px; }
        .search-card { background:white; margin-top:-70px; border-radius:24px; box-shadow:0 20px 50px rgba(15,23,42,.12); padding:32px; position:relative; z-index:2; }
        .section-title { font-size:2rem; font-weight:700; text-align:center; margin-bottom:16px; color:var(--dark); }
        .section-subtitle { text-align:center; color:var(--muted); max-width:720px; margin:0 auto 40px; }
        .feature-card, .event-card, .info-card, .card-box { background:var(--card); border-radius:18px; padding:24px; box-shadow:0 12px 30px rgba(15,23,42,.08); border:1px solid rgba(148,163,184,.16); height:100%; }
        .feature-card i { font-size:1.4rem; color:var(--primary-dark); background:#fff7e6; width:46px; height:46px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; margin-bottom:12px; }
        .stats-bar { background:linear-gradient(90deg,#0f172a,#1d4ed8); color:white; border-radius:24px; padding:24px; margin-top:40px; }
        .cta-section { background:linear-gradient(135deg,#fffbeb,#eff6ff); border-radius:24px; padding:48px 24px; margin:40px auto 60px; text-align:center; }
        footer { background:#0f172a; color:#cbd5e1; padding:30px 0; }
    </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
